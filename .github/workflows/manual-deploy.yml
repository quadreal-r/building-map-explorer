# Run from GitHub → Actions → "Manual deploy (commit, push & Pages)" → Run workflow
# Rebuilds the app from main, bumps the version stamp, commits & pushes, deploys GitHub Pages.

name: Manual deploy (commit, push & Pages)

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: Optional extra note appended to the version commit
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: manual-deploy
  cancel-in-progress: false

jobs:
  sync-json-to-r2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Upload portfolio JSON to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_JSON_BUCKET: ${{ secrets.R2_JSON_BUCKET }}
        run: node scripts/upload-json-to-r2.mjs

  build:
    needs: sync-json-to-r2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Bump version stamp
        run: node scripts/bump-version.mjs

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAPS_MAP_ID: ${{ secrets.VITE_GOOGLE_MAPS_MAP_ID }}
          VITE_RTU_PICTURES_BASE_URL: ${{ secrets.VITE_RTU_PICTURES_BASE_URL }}
          VITE_RTU_DOCUMENTS_BASE_URL: ${{ secrets.VITE_RTU_DOCUMENTS_BASE_URL }}
          VITE_JSON_DATA_BASE_URL: ${{ secrets.VITE_JSON_DATA_BASE_URL }}

      - name: Sync RTU pictures to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.VITE_RTU_PICTURES_BASE_URL }}
          R2_KEY_PREFIX: ${{ secrets.R2_KEY_PREFIX }}
        run: node scripts/upload-rtu-pictures-r2.mjs

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Commit and push version stamp
        env:
          EXTRA_NOTE: ${{ inputs.commit_message }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.build.json src/generated/buildVersion.ts
          if git diff --staged --quiet; then
            echo "Version stamp unchanged — nothing to commit."
            exit 0
          fi
          NOTE=""
          if [ -n "$EXTRA_NOTE" ]; then
            NOTE=" — ${EXTRA_NOTE}"
          fi
          git commit -m "chore: manual deploy version stamp${NOTE} [skip ci]"
          git pull --rebase origin main
          git push origin main

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
