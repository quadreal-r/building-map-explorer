name: Sync deploy bundle to Cloudflare and GitHub

on:
  workflow_dispatch:
    inputs:
      staging_ref:
        description: Branch containing sync/deploy-bundle.json
        required: false
        default: bme-sync-staging
        type: string
      rebuild_manifest:
        description: Rebuild manifest.json from R2 after applying bundle
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

concurrency:
  group: sync-deploy
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.BME_SYNC_PAT }}
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch sync staging branch
        env:
          STAGING_REF: ${{ inputs.staging_ref }}
          BME_SYNC_PAT: ${{ secrets.BME_SYNC_PAT }}
        run: |
          if [ -z "${BME_SYNC_PAT}" ]; then
            echo "::error::BME_SYNC_PAT is missing. Add the same GitHub token as Settings under repository Secrets → Actions."
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${BME_SYNC_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin "${STAGING_REF}:refs/remotes/origin/${STAGING_REF}"

      - name: Load deploy bundle from staging branch
        env:
          STAGING_REF: origin/${{ inputs.staging_ref }}
        run: node scripts/load-sync-staging-bundle.mjs

      - name: Apply bundle (R2 upload + portfolio data)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.VITE_RTU_PICTURES_BASE_URL }}
          R2_KEY_PREFIX: ${{ secrets.R2_KEY_PREFIX }}
        run: node scripts/apply-deploy-bundle.mjs deploy-bundle.json

      - name: Rebuild RTU picture manifest from R2
        if: inputs.rebuild_manifest == 'true'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.VITE_RTU_PICTURES_BASE_URL }}
          R2_KEY_PREFIX: ${{ secrets.R2_KEY_PREFIX }}
        run: node scripts/build-rtu-picture-manifest.mjs

      - name: Upload portfolio JSON to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_JSON_BUCKET: ${{ secrets.R2_JSON_BUCKET }}
        run: node scripts/upload-json-to-r2.mjs

      - name: Commit and push
        env:
          BME_SYNC_PAT: ${{ secrets.BME_SYNC_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/data public/database/rtu-pictures/manifest.json public/database/rtu-pictures/hidden.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: sync portfolio and RTU pictures from Settings"
          if [ -z "${BME_SYNC_PAT}" ]; then
            echo "::error::BME_SYNC_PAT is required to push commits."
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${BME_SYNC_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main
